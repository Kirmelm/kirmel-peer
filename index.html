<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KirmelCrypt | P2P Messenger & Social Platform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <!-- THEME TOGGLE (Top Right) -->
        <button id="themeToggle" class="theme-toggle" title="Toggle theme">🌙</button>
        
        <!-- ADMIN PANEL BUTTON (Top Right) -->
        <button id="adminPanelBtn" class="admin-panel-btn hidden" title="Admin Panel">⚙️</button>
        
        <!-- LOADING SPINNER -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
        </div>
        
        <!-- LANDING PAGE -->
        <section id="landing" class="screen">
            <div class="container">
                <div class="logo-container">
                    <div class="logo">🔐</div>
                    <h1>KirmelCrypt</h1>
                    <p class="tagline">Private. Secure. Peer-to-Peer.</p>
                </div>
                <div class="features">
                    <div class="feature">
                        <span class="icon">🔒</span>
                        <h3>E2EE Encryption</h3>
                        <p>End-to-End encrypted messages</p>
                    </div>
                    <div class="feature">
                        <span class="icon">👥</span>
                        <h3>P2P Network</h3>
                        <p>Direct peer connections</p>
                    </div>
                    <div class="feature">
                        <span class="icon">⚡</span>
                        <h3>Serverless</h3>
                        <p>Powered by Firebase</p>
                    </div>
                </div>
                <div class="auth-buttons">
                    <button id="signUpBtn" class="btn btn-primary">Sign Up</button>
                    <button id="signInBtn" class="btn btn-secondary">Sign In</button>
                </div>
            </div>
        </section>
        
        <!-- AUTH PAGE -->
        <section id="authPage" class="screen hidden">
            <div class="container auth-container">
                <button class="back-btn" id="backFromAuth">← Back</button>
                <div class="auth-box">
                    <h2 id="authTitle">Sign Up</h2>
                    <form id="authForm">
                        <input type="email" id="authEmail" placeholder="Email" required>
                        <input type="password" id="authPassword" placeholder="Password (min 6)" required>
                        <div id="confirmPasswordDiv" class="hidden">
                            <input type="password" id="authConfirmPassword" placeholder="Confirm Password" required>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </form>
                    <p id="toggleAuthMode" class="toggle-auth">Already have an account? <span>Sign In</span></p>
                    <div id="authError" class="error hidden"></div>
                </div>
            </div>
        </section>
        
        <!-- MESSENGER PAGE -->
        <section id="messenger" class="screen hidden">
            <div class="messenger-container">
                <!-- Sidebar -->
                <aside class="sidebar">
                    <div class="sidebar-header">
                        <h2>Chats</h2>
                        <button id="newChatBtn" class="btn-icon" title="New Chat">➕</button>
                    </div>
                    <div id="chatsList" class="chats-list">
                        <!-- Dynamically populated -->
                    </div>
                </aside>
                
                <!-- Main Chat -->
                <main class="chat-main">
                    <div id="chatEmpty" class="chat-empty">
                        <p>Select a chat to start messaging</p>
                    </div>
                    <div id="chatWindow" class="chat-window hidden">
                        <div class="chat-header">
                            <h3 id="chatTitle">Chat</h3>
                            <button id="profileBtn" class="btn-icon" title="Profile">👤</button>
                        </div>
                        <div id="messagesContainer" class="messages-container">
                            <!-- Messages loaded here -->
                        </div>
                        <form id="messageForm" class="message-form">
                            <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                            <button type="submit" class="btn-icon" title="Send">✈️</button>
                        </form>
                    </div>
                </main>
            </div>
        </section>
        
        <!-- PROFILE PAGE -->
        <section id="profilePage" class="screen hidden">
            <div class="container profile-container">
                <button class="back-btn" id="backFromProfile">← Back</button>
                <div class="profile-box">
                    <h2>My Profile</h2>
                    <div class="avatar-section">
                        <img id="avatarPreview" class="avatar" src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23ddd'/%3E%3Ccircle cx='50' cy='35' r='15' fill='%23999'/%3E%3Cellipse cx='50' cy='65' rx='25' ry='20' fill='%23999'/%3E%3C/svg%3E" alt="Avatar">
                        <input type="file" id="avatarInput" accept="image/*" hidden>
                        <button type="button" id="uploadAvatarBtn" class="btn btn-secondary">Upload Avatar</button>
                    </div>
                    <form id="profileForm">
                        <input type="text" id="nicknameInput" placeholder="Nickname" maxlength="30" required>
                        <textarea id="bioInput" placeholder="Bio" maxlength="150"></textarea>
                        <button type="submit" class="btn btn-primary">Save Profile</button>
                    </form>
                    <button id="logoutBtn" class="btn btn-danger">Logout</button>
                    <div id="profileError" class="error hidden"></div>
                </div>
            </div>
        </section>
        
        <!-- ADMIN MODAL -->
        <div id="adminModal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Admin Panel</h2>
                    <button class="close-modal" id="closeAdminModal">✕</button>
                </div>
                <div class="modal-body">
                    <div class="admin-tabs">
                        <button class="tab-btn active" data-tab="users">Users</button>
                        <button class="tab-btn" data-tab="banned">Banned</button>
                        <button class="tab-btn" data-tab="roles">Roles</button>
                    </div>
                    
                    <!-- Users Tab -->
                    <div id="usersTab" class="tab-content active">
                        <div class="search-box">
                            <input type="text" id="userSearch" placeholder="Search users...">
                        </div>
                        <div id="usersList" class="users-list">
                            <!-- Users loaded dynamically -->
                        </div>
                    </div>
                    
                    <!-- Banned Tab -->
                    <div id="bannedTab" class="tab-content hidden">
                        <div id="bannedList" class="banned-list">
                            <!-- Banned users loaded dynamically -->
                        </div>
                    </div>
                    
                    <!-- Roles Tab -->
                    <div id="rolesTab" class="tab-content hidden">
                        <div id="rolesList" class="roles-list">
                            <!-- Roles loaded dynamically -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- BAN ACTION MODAL -->
        <div id="banModal" class="modal hidden">
            <div class="modal-content ban-modal-content">
                <div class="modal-header">
                    <h2>Ban User</h2>
                    <button class="close-modal" id="closeBanModal">✕</button>
                </div>
                <form id="banForm">
                    <div class="form-group">
                        <label for="banReason">Reason</label>
                        <textarea id="banReason" placeholder="Why is this user banned?" required></textarea>
                    </div>
                    <div class="form-group">
                        <label for="banType">Ban Type</label>
                        <select id="banType" required>
                            <option value="">Select...</option>
                            <option value="temporary">Temporary (24h)</option>
                            <option value="permanent">Permanent</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="banPenalty">Penalty</label>
                        <input type="text" id="banPenalty" placeholder="e.g., -50 reputation">
                    </div>
                    <button type="submit" class="btn btn-danger">Confirm Ban</button>
                </form>
            </div>
        </div>
    </div>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"></script>
    
    <!-- App Scripts -->
    <script src="index.js"></script>
    <script src="app.js"></script>
</body>
</html>
