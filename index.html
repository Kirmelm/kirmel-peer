<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KirmelCrypt</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:system-ui,sans-serif; }
        body { background:#0e1621; color:#fff; overflow:hidden; height:100vh; }
        #auth { display:flex; align-items:center; justify-content:center; height:100vh; background:#0e1621; }
        #auth .card { background:#17212b; padding:40px; border-radius:12px; max-width:380px; width:90%; text-align:center; }
        #auth .card h1 { color:#5288c1; margin-bottom:8px; }
        #auth .card p { color:#708499; margin-bottom:24px; }
        #auth .card button { background:#5288c1; color:#fff; border:none; padding:12px; border-radius:8px; width:100%; font-size:16px; cursor:pointer; }
        #auth .card button:hover { background:#649ad4; }
        #auth .card .err { color:#e74c3c; margin-top:12px; display:none; }
        #app { display:none; height:100vh; }
        .container { display:flex; height:100%; }
        .sidebar { width:300px; background:#17212b; border-right:1px solid #1e2a36; display:flex; flex-direction:column; flex-shrink:0; }
        .sidebar-header { padding:16px; border-bottom:1px solid #1e2a36; }
        .sidebar-header h2 { color:#5288c1; font-size:18px; }
        .user-row { display:flex; align-items:center; gap:10px; margin:12px 0; }
        .avatar { width:40px; height:40px; border-radius:50%; object-fit:cover; background:#2b394a; }
        .user-name { font-weight:600; }
        .user-id { font-size:12px; color:#708499; cursor:pointer; }
        .connect-row { display:flex; gap:6px; margin-top:8px; }
        .connect-row input { flex:1; padding:8px 12px; border-radius:8px; border:1px solid #1e2a36; background:#0e1621; color:#fff; outline:none; font-size:14px; }
        .connect-row input:focus { border-color:#5288c1; }
        .connect-row button { width:40px; background:#5288c1; border:none; border-radius:8px; color:#fff; font-size:20px; cursor:pointer; }
        .connect-row button:hover { background:#649ad4; }
        .chats { flex:1; overflow-y:auto; padding:8px; }
        .chat-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:8px; cursor:pointer; }
        .chat-item:hover { background:#2b394a; }
        .chat-item.active { background:#2b394a; }
        .chat-item .info { flex:1; overflow:hidden; }
        .chat-item .name { font-weight:600; font-size:14px; }
        .chat-item .last { font-size:12px; color:#708499; }
        .empty { text-align:center; color:#708499; padding:40px 0; }
        .empty span { font-size:40px; display:block; margin-bottom:8px; }
        .chat { flex:1; display:flex; flex-direction:column; background:#0e1621; }
        .chat-header { height:56px; padding:0 16px; display:flex; align-items:center; gap:12px; background:#17212b; border-bottom:1px solid #1e2a36; flex-shrink:0; }
        .chat-header .left { display:flex; align-items:center; gap:12px; flex:1; cursor:pointer; }
        .chat-header .status { font-size:12px; color:#708499; }
        .chat-header .status .dot { width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:4px; }
        .chat-header .status .dot.on { background:#4cd964; }
        .chat-header .status .dot.off { background:#708499; }
        .chat-header .actions { display:flex; gap:8px; }
        .chat-header .actions button { background:none; border:none; color:#708499; font-size:18px; cursor:pointer; }
        .chat-header .actions button:hover { color:#fff; }
        .msgs { flex:1; padding:16px 20px; overflow-y:auto; display:flex; flex-direction:column; gap:2px; }
        .msg { max-width:75%; padding:8px 14px; border-radius:16px; font-size:14px; word-wrap:break-word; margin-bottom:2px; }
        .msg.out { background:#2b5278; align-self:flex-end; border-bottom-right-radius:4px; }
        .msg.in { background:#1a2a3a; align-self:flex-start; border-bottom-left-radius:4px; border:1px solid #2a3a4a; }
        .msg .time { font-size:10px; color:#708499; text-align:right; margin-top:4px; }
        .sep { text-align:center; color:#708499; font-size:12px; padding:12px 0 8px; width:100%; }
        .empty-chat { text-align:center; color:#708499; margin:auto; }
        .empty-chat span { font-size:48px; display:block; margin-bottom:16px; }
        .empty-chat h3 { color:#fff; margin-bottom:8px; }
        .input-area { padding:12px 16px; background:#17212b; border-top:1px solid #1e2a36; display:flex; gap:8px; align-items:center; flex-shrink:0; }
        .input-area input { flex:1; padding:8px 16px; border-radius:20px; border:1px solid #1e2a36; background:#0e1621; color:#fff; outline:none; font-size:14px; }
        .input-area input:focus { border-color:#5288c1; }
        .input-area .send { width:40px; height:40px; border-radius:50%; background:#5288c1; border:none; color:#fff; font-size:18px; cursor:pointer; flex-shrink:0; }
        .input-area .send:hover { background:#649ad4; }
        .input-area .btn-icon { background:none; border:none; color:#708499; font-size:20px; cursor:pointer; padding:4px; }
        .input-area .btn-icon:hover { color:#fff; }
        #admin-panel { display:none; padding:10px 16px; border-top:1px solid #1e2a36; background:#17212b; }
        #admin-panel h4 { color:#5288c1; font-size:13px; margin-bottom:6px; }
        #admin-panel input { width:100%; padding:6px 10px; border-radius:4px; border:1px solid #1e2a36; background:#0e1621; color:#fff; font-size:12px; margin-bottom:6px; }
        #admin-panel .row { display:flex; gap:6px; flex-wrap:wrap; }
        #admin-panel .row button { padding:4px 10px; border:none; border-radius:4px; font-size:11px; cursor:pointer; }
        #admin-panel .row .danger { background:#e74c3c; color:#fff; }
        #admin-panel .row .success { background:#27ae60; color:#fff; }
        #admin-panel .row .warning { background:#f39c12; color:#fff; }
        #admin-panel .row .info { background:#5288c1; color:#fff; }
        #admin-panel .list { max-height:120px; overflow-y:auto; font-size:12px; margin-top:6px; }
        #admin-panel .list div { padding:4px; border-bottom:1px solid #1e2a36; display:flex; justify-content:space-between; }
        #profile { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center; }
        #profile .modal { background:#17212b; border-radius:16px; padding:32px; max-width:360px; width:90%; position:relative; text-align:center; }
        #profile .modal .close { position:absolute; top:12px; right:16px; font-size:24px; cursor:pointer; color:#708499; }
        #profile .modal .close:hover { color:#fff; }
        #profile .modal .p-avatar { width:80px; height:80px; border-radius:50%; object-fit:cover; margin-bottom:12px; }
        #profile .modal .p-name { font-size:20px; font-weight:700; }
        #profile .modal .p-id { font-size:13px; color:#708499; }
        #profile .modal .p-status { font-size:14px; color:#708499; }
        #profile .modal .p-role { font-size:12px; color:#ffd700; }
        #profile .modal .p-btn { margin-top:16px; }
        #profile .modal .p-btn button { background:#5288c1; color:#fff; border:none; padding:8px 20px; border-radius:8px; cursor:pointer; }
        @media (max-width:600px) {
            .sidebar { width:100%; max-height:35vh; }
            .container { flex-direction:column; }
            .chat { height:65vh; }
            .msg { max-width:85%; }
        }
    </style>
</head>
<body>

<div id="auth">
    <div class="card">
        <h1>🔐 KirmelCrypt</h1>
        <p>Безопасный P2P-мессенджер</p>
        <button id="loginBtn">Войти через Google</button>
        <div class="err" id="authError"></div>
    </div>
</div>

<div id="app">
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-header">
                <h2>🔐 KirmelCrypt</h2>
                <div class="user-row">
                    <img class="avatar" id="myAvatar" src="">
                    <div>
                        <div class="user-name" id="myName">Загрузка...</div>
                        <div class="user-id" id="myIdDisplay">ID: ...</div>
                    </div>
                </div>
                <div class="connect-row">
                    <input type="text" id="peerInput" placeholder="Введите ID собеседника">
                    <button id="connectBtn">➕</button>
                </div>
            </div>
            <div class="chats" id="chatsList">
                <div class="empty"><span>💬</span>Нет активных чатов</div>
            </div>
            <div id="admin-panel">
                <h4>👑 Админ-панель</h4>
                <input type="text" id="adminUserId" placeholder="ID пользователя">
                <div class="row">
                    <button class="danger" id="banBtn">🚫 Бан</button>
                    <button class="success" id="unbanBtn">✅ Разбан</button>
                    <button class="warning" id="makeAdminBtn">⭐ Назначить админа</button>
                </div>
                <button class="info" id="showUsersBtn" style="width:100%;margin-top:4px;">📋 Список пользователей</button>
                <div class="list" id="adminUsersList"></div>
            </div>
        </div>
        <div class="chat">
            <div class="chat-header" id="chatHeader" style="display:none;">
                <div class="left" id="chatHeaderClick">
                    <img class="avatar" id="chatAvatar" src="">
                    <div>
                        <div class="user-name" id="chatName">Собеседник</div>
                        <div class="status">
                            <span class="dot off" id="statusDot"></span>
                            <span id="statusText">Подключение...</span>
                        </div>
                    </div>
                </div>
                <div class="actions">
                    <button id="profileBtn">👤</button>
                    <button id="callBtn">📞</button>
                </div>
            </div>
            <div class="msgs" id="msgContainer">
                <div class="empty-chat">
                    <span>🔐</span>
                    <h3>Безопасный чат</h3>
                    <p>Введите ID друга для начала защищенной сессии</p>
                </div>
            </div>
            <div class="input-area" id="inputArea" style="display:none;">
                <button class="btn-icon" id="emojiBtn">😊</button>
                <input type="text" id="msgInput" placeholder="Напишите сообщение...">
                <button class="send" id="sendBtn">➤</button>
            </div>
        </div>
    </div>
</div>

<div id="profile">
    <div class="modal">
        <div class="close" id="profileClose">✕</div>
        <img class="p-avatar" id="pAvatar" src="">
        <div class="p-name" id="pName">Имя</div>
        <div class="p-id" id="pId">ID: ...</div>
        <div class="p-status" id="pStatus">Статус</div>
        <div class="p-role" id="pRole">Роль</div>
        <div class="p-btn"><button id="pChatBtn">💬 Написать</button></div>
    </div>
</div>

<script>
// ============================================================
// FIREBASE
// ============================================================
const firebaseConfig = {
    apiKey: "AIzaSyCpqM2Mbz_0l1hB5BLgQ80F8GYFKdSw3PA",
    authDomain: "kirmelcript.firebaseapp.com",
    projectId: "kirmelcript",
    storageBucket: "kirmelcript.firebasestorage.app",
    messagingSenderId: "668992683850",
    appId: "1:668992683850:web:c2f76667fafac7cd714bb3",
    measurementId: "G-MD938Z2WX6"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ============================================================
// ПЕРЕМЕННЫЕ
// ============================================================
let myId = null;
let chatWith = null;
let currentUser = null;
let isAdmin = false;
let isCreator = false;
let loaded = new Set();

// ============================================================
// DOM
// ============================================================
const $ = id => document.getElementById(id);

// ============================================================
// 1. ВХОД
// ============================================================
$('loginBtn').onclick = () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(err => {
        $('authError').textContent = err.message;
        $('authError').style.display = 'block';
    });
};

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        $('auth').style.display = 'none';
        $('app').style.display = 'block';
        
        myId = user.uid;
        $('myAvatar').src = user.photoURL || '';
        $('myName').textContent = user.displayName || 'Аноним';
        $('myIdDisplay').textContent = `ID: ${myId.substring(0,12)} (клик)`;
        $('myIdDisplay').onclick = () => {
            navigator.clipboard.writeText(myId.substring(0,12));
            alert('✅ ID скопирован!');
        };
        
        db.ref('users/' + myId).set({
            name: user.displayName,
            avatar: user.photoURL,
            online: true
        });
        
        loadChats();
        listenMessages();
        checkAdmin();
    } else {
        $('auth').style.display = 'flex';
        $('app').style.display = 'none';
    }
});

// ============================================================
// 2. ПОКАЗ СООБЩЕНИЙ (ПРЯМОЙ РЕНДЕРИНГ)
// ============================================================
function renderMessages(peerId) {
    const container = $('msgContainer');
    if (!container) return;
    
    container.innerHTML = '';
    loaded.clear();
    chatWith = peerId;
    
    db.ref('messages/' + myId + '/' + peerId).once('value', snap => {
        const data = snap.val();
        if (data) {
            const msgs = Object.values(data).sort((a,b) => (a.timestamp||0) - (b.timestamp||0));
            let lastDate = '';
            msgs.forEach(m => {
                if (m && m.text) {
                    const date = new Date(m.timestamp || Date.now());
                    const dateStr = date.toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
                    if (dateStr !== lastDate) {
                        const sep = document.createElement('div');
                        sep.className = 'sep';
                        sep.textContent = dateStr;
                        container.appendChild(sep);
                        lastDate = dateStr;
                    }
                    const div = document.createElement('div');
                    div.className = 'msg ' + (m.from === myId ? 'out' : 'in');
                    const timeStr = date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
                    div.innerHTML = `<div>${m.text}</div><div class="time">${timeStr}</div>`;
                    container.appendChild(div);
                }
            });
            container.scrollTop = container.scrollHeight;
            console.log('📚 Показано ' + msgs.length + ' сообщений');
        }
    });
}

// ============================================================
// 3. СЛУШАТЕЛЬ НОВЫХ СООБЩЕНИЙ
// ============================================================
function listenMessages() {
    db.ref('messages/' + myId).on('child_added', snap => {
        const data = snap.val();
        const fromId = snap.key;
        if (!data || !data.text || data.from === myId) return;
        
        console.log('📩 Новое сообщение от:', fromId, 'текст:', data.text);
        
        // Если чат открыт с этим человеком - показываем
        if (chatWith && chatWith === fromId) {
            const container = $('msgContainer');
            if (!container) return;
            
            // Проверяем последний разделитель
            const date = new Date(data.timestamp || Date.now());
            const dateStr = date.toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
            const separators = container.querySelectorAll('.sep');
            let lastSep = separators[separators.length-1];
            if (!lastSep || lastSep.textContent !== dateStr) {
                const sep = document.createElement('div');
                sep.className = 'sep';
                sep.textContent = dateStr;
                container.appendChild(sep);
            }
            
            const div = document.createElement('div');
            div.className = 'msg in';
            const timeStr = date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
            div.innerHTML = `<div>${data.text}</div><div class="time">${timeStr}</div>`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            
            updateLast(fromId, data.text);
        }
        
        // Сохраняем чат
        db.ref('users/' + fromId).once('value', s => {
            const u = s.val();
            if (u) saveChat(fromId, u.name, u.avatar);
        });
    });
}

// ============================================================
// 4. ЧАТЫ
// ============================================================
function loadChats() {
    db.ref('chats/' + myId).on('value', snap => {
        const data = snap.val();
        const list = $('chatsList');
        list.innerHTML = '';
        if (!data) {
            list.innerHTML = '<div class="empty"><span>💬</span>Нет активных чатов</div>';
            return;
        }
        const arr = Object.values(data).sort((a,b) => (b.timestamp||0) - (a.timestamp||0));
        arr.forEach(chat => {
            const div = document.createElement('div');
            div.className = 'chat-item';
            if (chat.peerId === chatWith) div.classList.add('active');
            div.dataset.id = chat.peerId;
            div.innerHTML = `
                <img class="avatar" src="${chat.avatar || ''}">
                <div class="info">
                    <div class="name">${chat.name}</div>
                    <div class="last">${chat.lastMessage || 'Новый чат'}</div>
                </div>
            `;
            div.onclick = () => openChat(chat.peerId);
            list.appendChild(div);
        });
    });
}

function saveChat(peerId, name, avatar) {
    db.ref('chats/' + myId + '/' + peerId).once('value', snap => {
        if (!snap.exists()) {
            db.ref('chats/' + myId + '/' + peerId).set({
                peerId, name: name || 'Собеседник', avatar: avatar || '', lastMessage: '', timestamp: Date.now()
            });
        }
    });
}

function updateLast(peerId, text) {
    db.ref('chats/' + myId + '/' + peerId).update({
        lastMessage: text.substring(0,50),
        timestamp: Date.now()
    });
}

// ============================================================
// 5. ОТКРЫТЬ ЧАТ
// ============================================================
function openChat(peerId) {
    chatWith = peerId;
    $('peerInput').value = peerId;
    $('chatHeader').style.display = 'flex';
    $('inputArea').style.display = 'flex';
    $('chatName').textContent = 'Загрузка...';
    $('chatAvatar').src = '';
    
    const empty = document.querySelector('.empty-chat');
    if (empty) empty.style.display = 'none';
    
    db.ref('users/' + peerId).once('value', snap => {
        const user = snap.val();
        if (user) {
            $('chatName').textContent = user.name || 'Собеседник';
            $('chatAvatar').src = user.avatar || '';
        }
    });
    
    document.querySelectorAll('.chat-item').forEach(el => el.classList.remove('active'));
    const item = document.querySelector(`.chat-item[data-id="${peerId}"]`);
    if (item) item.classList.add('active');
    
    $('statusDot').className = 'dot on';
    $('statusText').textContent = 'Онлайн ✅';
    
    // ЗАГРУЖАЕМ СООБЩЕНИЯ
    renderMessages(peerId);
}

// ============================================================
// 6. ПОДКЛЮЧИТЬСЯ
// ============================================================
$('connectBtn').onclick = async () => {
    const target = $('peerInput').value.trim();
    if (!target) return alert('Введите ID');
    if (target === myId) return alert('Нельзя к себе');
    
    const snap = await db.ref('users/' + target).once('value');
    if (!snap.exists()) return alert('Пользователь не найден');
    
    const user = snap.val();
    saveChat(target, user.name, user.avatar);
    openChat(target);
};

// ============================================================
// 7. ОТПРАВИТЬ
// ============================================================
$('sendBtn').onclick = () => {
    const text = $('msgInput').value.trim();
    if (!text) return alert('Введите сообщение');
    if (!chatWith) return alert('Нет собеседника');
    
    const ts = Date.now();
    db.ref('messages/' + chatWith + '/' + myId).push().set({
        from: myId, text, name: currentUser.displayName, timestamp: ts
    });
    db.ref('messages/' + myId + '/' + chatWith).push().set({
        from: myId, text, name: currentUser.displayName, timestamp: ts
    });
    
    // Показываем сразу
    const container = $('msgContainer');
    const date = new Date(ts);
    const dateStr = date.toLocaleDateString('ru-RU', {day:'numeric',month:'long'});
    const separators = container.querySelectorAll('.sep');
    let lastSep = separators[separators.length-1];
    if (!lastSep || lastSep.textContent !== dateStr) {
        const sep = document.createElement('div');
        sep.className = 'sep';
        sep.textContent = dateStr;
        container.appendChild(sep);
    }
    const div = document.createElement('div');
    div.className = 'msg out';
    const timeStr = date.toLocaleTimeString('ru-RU', {hour:'2-digit',minute:'2-digit'});
    div.innerHTML = `<div>${text}</div><div class="time">${timeStr}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    
    updateLast(chatWith, text);
    $('msgInput').value = '';
};

$('msgInput').onkeydown = e => {
    if (e.key === 'Enter') $('sendBtn').click();
};

// ============================================================
// 8. ЭМОДЗИ
// ============================================================
$('emojiBtn').onclick = () => {
    const emojis = ['😊','😂','❤️','🔥','👍','👋','🎉','✨','💪','🤝'];
    $('msgInput').value += emojis[Math.floor(Math.random() * emojis.length)];
    $('msgInput').focus();
};

// ============================================================
// 9. ПРОФИЛЬ
// ============================================================
function showProfile(userId) {
    db.ref('users/' + userId).once('value', async snap => {
        const user = snap.val();
        if (!user) return;
        $('pAvatar').src = user.avatar || '';
        $('pName').textContent = user.name || 'Без имени';
        $('pId').textContent = 'ID: ' + userId.substring(0,12);
        $('pStatus').textContent = user.online ? '🟢 Онлайн' : '⚫ Офлайн';
        const role = await getUserRole(userId);
        $('pRole').textContent = role === 'creator' ? '👑 Создатель' : role === 'admin' ? '⭐ Админ' : 'Пользователь';
        $('profile').style.display = 'flex';
    });
}

$('chatHeaderClick').onclick = () => { if (chatWith) showProfile(chatWith); };
$('profileBtn').onclick = () => { if (chatWith) showProfile(chatWith); };
$('profileClose').onclick = () => $('profile').style.display = 'none';
$('profile').onclick = e => { if (e.target === e.currentTarget) $('profile').style.display = 'none'; };
$('pChatBtn').onclick = () => {
    $('profile').style.display = 'none';
    if (chatWith) openChat(chatWith);
};
$('callBtn').onclick = () => alert('📞 Функция звонков в разработке!');

// ============================================================
// 10. РОЛИ
// ============================================================
async function checkAdmin() {
    const c = await db.ref('creator').once('value');
    if (c.exists() && c.val() === myId) { isCreator = true; isAdmin = true; }
    else {
        const a = await db.ref('admins/' + myId).once('value');
        if (a.exists()) isAdmin = true;
    }
    if (isAdmin || isCreator) $('admin-panel').style.display = 'block';
}

async function getUserRole(userId) {
    const c = await db.ref('creator').once('value');
    if (c.exists() && c.val() === userId) return 'creator';
    const a = await db.ref('admins/' + userId).once('value');
    if (a.exists()) return 'admin';
    return 'user';
}

async function isBanned(userId) {
    const s = await db.ref('banned/' + userId).once('value');
    return s.exists();
}

$('banBtn').onclick = async () => {
    const id = $('adminUserId').value.trim();
    if (!id) return alert('Введите ID');
    if (!isAdmin && !isCreator) return alert('Нет прав');
    await db.ref('banned/' + id).set({ bannedAt: Date.now(), reason: 'Нарушение', bannedBy: myId });
    alert('✅ Забанен');
};
$('unbanBtn').onclick = async () => {
    const id = $('adminUserId').value.trim();
    if (!id) return alert('Введите ID');
    if (!isAdmin && !isCreator) return alert('Нет прав');
    await db.ref('banned/' + id).remove();
    alert('✅ Разбанен');
};
$('makeAdminBtn').onclick = async () => {
    const id = $('adminUserId').value.trim();
    if (!id) return alert('Введите ID');
    if (!isCreator) return alert('Только создатель');
    const snap = await db.ref('users/' + id).once('value');
    if (!snap.exists()) return alert('Пользователь не найден');
    await db.ref('admins/' + id).set({ role: 'admin', name: snap.val().name, addedAt: Date.now() });
    alert('✅ Админ назначен');
};
$('showUsersBtn').onclick = async () => {
    if (!isAdmin && !isCreator) return alert('Нет прав');
    const snap = await db.ref('users').once('value');
    const users = snap.val();
    let html = '';
    for (const [id, user] of Object.entries(users || {})) {
        const banned = await isBanned(id);
        html += `<div><span>${user.name || 'Без имени'}</span><span>${banned ? '🚫' : '✅'}</span></div>`;
    }
    $('adminUsersList').innerHTML = html || '<div style="color:#708499;">Нет пользователей</div>';
};
