<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KirmelCrypt</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #182533; color: #f5f5f5; font-family: sans-serif; }
        
        #auth-screen { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .auth-card { background: #17212b; padding: 40px; border-radius: 12px; text-align: center; max-width: 400px; }
        .auth-card h1 { color: #5288c1; }
        .btn { background: #5288c1; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px; }
        .btn:hover { background: #649ad4; }
        
        #app-screen { display: none; height: 100vh; }
        .container { display: flex; height: 100%; }
        
        .sidebar { width: 300px; background: #17212b; border-right: 1px solid #101921; display: flex; flex-direction: column; }
        .sidebar-header { padding: 16px; border-bottom: 1px solid #101921; }
        .user-profile { display: flex; align-items: center; gap: 10px; margin: 10px 0; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; background: #2b394a; object-fit: cover; }
        .user-name { font-weight: 600; }
        .my-id { font-size: 12px; color: #708499; cursor: pointer; }
        .connect-box { display: flex; gap: 6px; margin-top: 10px; }
        .connect-box input { flex: 1; padding: 8px; border-radius: 8px; border: 1px solid #101921; background: #182533; color: white; }
        .btn-connect { width: 40px; background: #5288c1; border: none; border-radius: 8px; color: white; cursor: pointer; font-size: 18px; }
        
        .chats-list { flex: 1; overflow-y: auto; padding: 8px; }
        .chat-item { display: flex; align-items: center; gap: 10px; padding: 10px; border-radius: 8px; cursor: pointer; }
        .chat-item:hover { background: #2b394a; }
        .chat-item.active { background: #2b394a; }
        .chat-item .user-info { flex: 1; }
        .chat-item .user-name { font-size: 14px; }
        .chat-item .chat-status { font-size: 12px; color: #708499; }
        .empty-chats { text-align: center; color: #708499; padding: 40px; }
        
        .main-chat { flex: 1; display: flex; flex-direction: column; background: #182533; }
        .chat-header { height: 60px; padding: 0 16px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #101921; background: #17212b; }
        .chat-header-left { display: flex; align-items: center; gap: 12px; flex: 1; cursor: pointer; }
        .chat-status { font-size: 12px; color: #708499; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .status-dot.online { background: #4cd964; }
        .status-dot.offline { background: #708499; }
        
        /* ===== ЭТО ГЛАВНОЕ - СООБЩЕНИЯ ===== */
        .messages-container { 
            flex: 1; 
            padding: 16px 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 4px;
            background: #182533;
        }
        
        .message {
            max-width: 70%;
            padding: 8px 14px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            word-wrap: break-word;
            margin-bottom: 2px;
        }
        
        .message.out {
            background: #2b5278;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            color: #ffffff;
        }
        
        .message.in {
            background: #1a2a3a;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            border: 1px solid #2a3a4a;
            color: #f5f5f5;
        }
        
        .message-time {
            font-size: 10px;
            color: #708499;
            text-align: right;
            margin-top: 4px;
        }
        
        .date-separator {
            text-align: center;
            color: #708499;
            font-size: 12px;
            padding: 12px 0 8px 0;
            width: 100%;
        }
        
        .chat-input-area { padding: 12px 16px; background: #17212b; display: flex; gap: 8px; border-top: 1px solid #101921; }
        .chat-input-area input { flex: 1; padding: 8px 14px; border-radius: 20px; border: 1px solid #101921; background: #182533; color: white; outline: none; }
        .btn-send { width: 40px; height: 40px; border-radius: 50%; background: #5288c1; border: none; color: white; cursor: pointer; font-size: 18px; }
        
        .system-info { text-align: center; color: #708499; margin: auto; }
        .system-info .placeholder-icon { font-size: 48px; display: block; margin-bottom: 16px; }
        
        #profile-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: #17212b; border-radius: 16px; padding: 32px; max-width: 400px; width: 90%; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 16px; font-size: 24px; cursor: pointer; color: #708499; }
        .profile-modal-body { text-align: center; }
        .profile-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; margin-bottom: 12px; }
        .profile-name { font-size: 20px; font-weight: 700; }
        .profile-id { font-size: 13px; color: #708499; }
        .profile-status { font-size: 14px; color: #708499; }
        .profile-role { font-size: 12px; color: #ffd700; }
        .profile-actions { margin-top: 16px; }
        .profile-actions .btn { width: auto; padding: 8px 20px; }
        
        .admin-btn { padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        .admin-btn-danger { background: #dc3545; color: white; }
        .admin-btn-success { background: #28a745; color: white; }
        .admin-btn-warning { background: #ffc107; color: #333; }
        .admin-btn { background: var(--accent); color: white; padding: 4px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 11px; }
        
        #admin-panel { display: none; padding: 10px; border-top: 1px solid #101921; }
        #admin-panel h3 { color: #5288c1; font-size: 14px; }
        #admin-panel .input-field { width: 100%; padding: 6px; border-radius: 4px; border: 1px solid #101921; background: #182533; color: white; font-size: 12px; }
        #admin-panel .admin-buttons { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 0; }
        #admin-users-list { max-height: 150px; overflow-y: auto; font-size: 12px; }
        
        @media (max-width: 768px) {
            .sidebar { width: 100%; max-height: 35vh; }
            .container { flex-direction: column; }
            .main-chat { height: 65vh; }
            .message { max-width: 85%; }
        }
    </style>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
</head>
<body>

    <!-- ЭКРАН ВХОДА -->
    <div id="auth-screen">
        <div class="auth-card">
            <h1>🔐 KirmelCrypt</h1>
            <p>Безопасный P2P-мессенджер</p>
            <button class="btn" id="btn-login">Войти через Google</button>
            <div id="error-message" style="color:#ec5b5b;margin-top:15px;display:none;"></div>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН -->
    <div id="app-screen">
        <div class="container">
            <div class="sidebar">
                <div class="sidebar-header">
                    <h2 style="color:#5288c1;">🔐 KirmelCrypt</h2>
                    <div class="user-profile">
                        <img id="my-avatar" class="avatar" src="">
                        <div class="user-info">
                            <div id="my-name" class="user-name">Загрузка...</div>
                            <div id="my-id-display" class="my-id">ID: тестируется...</div>
                        </div>
                    </div>
                    <div class="connect-box">
                        <input type="text" id="peer-id-input" placeholder="Введите ID собеседника">
                        <button class="btn-connect" id="btn-connect">➕</button>
                    </div>
                </div>
                <div class="chats-list" id="chats-list">
                    <div class="empty-chats"><span>💬</span><p>Нет активных чатов</p></div>
                </div>
                <div id="admin-panel">
                    <h3>👑 Админ-панель</h3>
                    <input type="text" id="admin-user-id" class="input-field" placeholder="ID пользователя">
                    <div class="admin-buttons">
                        <button class="admin-btn admin-btn-danger" id="btn-ban">🚫 Бан</button>
                        <button class="admin-btn admin-btn-success" id="btn-unban">✅ Разбан</button>
                        <button class="admin-btn admin-btn-warning" id="btn-make-admin">⭐ Назначить админа</button>
                    </div>
                    <button class="admin-btn" id="btn-show-users" style="width:100%;">📋 Список пользователей</button>
                    <div id="admin-users-list"></div>
                </div>
            </div>
            <div class="main-chat">
                <div class="chat-header" id="active-chat-header" style="display:none;">
                    <div class="chat-header-left" id="chat-header-click">
                        <img id="chat-avatar" class="avatar" src="">
                        <div class="chat-header-info">
                            <div id="chat-name" class="user-name">Собеседник</div>
                            <div class="chat-status">
                                <span class="status-dot"></span>
                                <span id="chat-status-text">Подключение...</span>
                            </div>
                        </div>
                    </div>
                    <button class="header-btn" id="btn-profile" style="background:none;border:none;color:#708499;font-size:18px;cursor:pointer;">👤</button>
                </div>
                <div class="messages-container" id="messages-container">
                    <div class="system-info" id="system-placeholder">
                        <span class="placeholder-icon">🔐</span>
                        <h3>Безопасный чат</h3>
                        <p>Введите ID друга для начала защищенной сессии</p>
                    </div>
                </div>
                <div class="chat-input-area" id="input-area" style="display:none;">
                    <input type="text" id="message-input" placeholder="Напишите сообщение...">
                    <button class="btn-send" id="btn-send">➤</button>
                </div>
            </div>
        </div>
    </div>

    <!-- МОДАЛЬНОЕ ОКНО ПРОФИЛЯ -->
    <div id="profile-modal">
        <div class="modal-content">
            <div class="modal-close" id="profile-modal-close">✕</div>
            <div class="profile-modal-body">
                <img id="profile-avatar" class="profile-avatar" src="">
                <div id="profile-name" class="profile-name">Имя</div>
                <div id="profile-id" class="profile-id">ID: ...</div>
                <div id="profile-status" class="profile-status">Статус</div>
                <div id="profile-role" class="profile-role">Роль</div>
                <div class="profile-actions">
                    <button class="btn" id="profile-chat" style="width:auto;padding:8px 20px;">💬 Написать</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="index.js"></script>
</body>
</html>
